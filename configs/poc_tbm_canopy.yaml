# PoC TBM — Canopy sensitivity (explicit LAD+Cd from ETH Canopy Height)
#
# 5 cases with explicit plant canopy drag (atmPlantCanopyUSource + TurbSource).
# z0 = 0.01 m (bare ground) — canopy drag is in the volume, NOT in z0.
# Same 5 timestamps as z0_sensitivity for direct comparison.
#
# Comparison: canopy results should approximate WorldCover z0 results
# (both account for vegetation drag, different modelling approach).

study:
  name: poc_tbm_canopy
  site: perdigao
  n_iterations: 500
  write_interval: 500
  transport_T: true
  coriolis: true
  mesher: terrainBlockMesher

terrainBlockMesher:
  origin: [0, 0, 0]
  p_corner: [-1000, -1000, 100]
  dimensions: [2000, 2000, 5000]
  p_above: [0, 0, 10000]
  blocks: [10, 10]
  cells_per_block: [3, 3, 50]
  grading: [1, 1, 15]
  max_dist_proj: 20000
  cylinder:
    centre: [0, 0, 100]
    radius: 7000
    radial_grading: 20
    radial_cells: 20
    n_sections: 8
  orthogonal_splines:
    normal_dist: 5000
  check_mesh: "true"

cases:
  c00:
    timestamp: "2017-05-04 18:00:00"
    label: "canopy+z0=0.01 | S 5.1 m/s"
    solver: simpleFoam
    thermal: false
    transport_T: true
    coriolis: true
    canopy: true
    z0_override: 0.01
    nprocs: 24

  c01:
    timestamp: "2017-05-11 12:00:00"
    label: "canopy+z0=0.01 | SW 6.3 m/s"
    solver: simpleFoam
    thermal: false
    transport_T: true
    coriolis: true
    canopy: true
    z0_override: 0.01
    nprocs: 24

  c02:
    timestamp: "2017-05-29 18:00:00"
    label: "canopy+z0=0.01 | WNW 3.7 m/s"
    solver: simpleFoam
    thermal: false
    transport_T: true
    coriolis: true
    canopy: true
    z0_override: 0.01
    nprocs: 24

  c03:
    timestamp: "2017-06-05 18:00:00"
    label: "canopy+z0=0.01 | WNW 6.3 m/s"
    solver: simpleFoam
    thermal: false
    transport_T: true
    coriolis: true
    canopy: true
    z0_override: 0.01
    nprocs: 24

  c04:
    timestamp: "2017-06-28 12:00:00"
    label: "canopy+z0=0.01 | W 6.4 m/s"
    solver: simpleFoam
    thermal: false
    transport_T: true
    coriolis: true
    canopy: true
    z0_override: 0.01
    nprocs: 24

validation:
  obs_zarr: "data/raw/perdigao_obs.zarr"
  output_dir: "data/validation/poc_tbm_canopy"
  towers:
    - tse04
    - tse09
    - tse13
